<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Text Classification Demo</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            background: #020617;
            padding: 30px 35px;
            border-radius: 12px;
            width: 520px;
            box-shadow: 0 0 30px rgba(0,0,0,.5);
        }

        h2{
            margin-top: 0;
            text-align: center;
        }

        textarea{
            width: 100%;
            height: 130px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        button{
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover{
            background: #2563eb;
        }

        .info{
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
        }

        .result{
            margin-top: 18px;
            background: #020617;
            border: 1px solid #1f2933;
            border-radius: 8px;
            padding: 10px;
            min-height: 40px;
        }

        ul{
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Cancer Classification</h2>

    <label>Metinleri gir (her virgül + yeni satır bir örnek):</label>
    <br><br>

    <textarea id="texts" placeholder="patient has chest pain
severe headache and nausea"></textarea>

    <div class="info">
        Her satır ayrı bir text olarak modele gönderilir.
    </div>

    <button onclick="sendPredict()">Tahmin Et</button>

    <div class="result" id="result"></div>
</div>


<script>
async function sendPredict(){

    const textarea = document.getElementById("texts").value.trim();

    if(!textarea){
        alert("Lütfen en az bir metin giriniz");
        return;
    }

    const lines = textarea.split("\n").filter(x => x.trim().length > 0);

    const payload = {
        texts: lines
    };

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "Tahmin yapılıyor...";

    try{
        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if(data.error){
            resultDiv.innerHTML = "Hata: " + data.error;
            return;
        }

       let html = "<b>Label sonuçları</b><ul>";

        for(let i = 0; i < data.predictions.length; i++){
            html += `<li><b>Label:</b> ${data.predictions[i]}</li>`;
        }

        html += "</ul>";

        resultDiv.innerHTML = html;

    }catch(err){
        resultDiv.innerHTML = "İstek sırasında hata oluştu.";
    }
}
</script>

</body>
</html>
